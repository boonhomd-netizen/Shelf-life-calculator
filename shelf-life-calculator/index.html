<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="เครื่องคำนวณอายุการจัดเก็บสินค้า - คำนวณวันผลิตและวันหมดอายุอัตโนมัติ">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shelf Life Calculator | คำนวณอายุสินค้า</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Animated background -->
        <div class="bg-gradient"></div>
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>

        <!-- Header -->
        <header class="app-header">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M3 9h18"/>
                        <path d="M9 21V9"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Shelf Life Calculator</h1>
                    <p class="subtitle">คำนวณอายุการจัดเก็บสินค้า</p>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Mode Selector -->
            <div class="card mode-card" id="modeCard">
                <div class="card-header">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                    </div>
                    <h2>เลือกโหมดการคำนวณ</h2>
                </div>
                <div class="mode-toggle" id="modeToggle">
                    <button class="mode-btn active" id="modeExpiry" data-mode="expiry" aria-label="คำนวณวันหมดอายุ">
                        <span class="mode-btn-icon">📅</span>
                        <span class="mode-btn-label">รู้วันผลิต</span>
                        <span class="mode-btn-desc">คำนวณวันหมดอายุ</span>
                    </button>
                    <button class="mode-btn" id="modeMfg" data-mode="mfg" aria-label="คำนวณวันผลิต">
                        <span class="mode-btn-icon">🏭</span>
                        <span class="mode-btn-label">รู้วันหมดอายุ</span>
                        <span class="mode-btn-desc">คำนวณวันผลิต</span>
                    </button>
                </div>
            </div>

            <!-- Input Card -->
            <div class="card input-card" id="inputCard">
                <div class="card-header">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </div>
                    <h2>กรอกข้อมูล</h2>
                </div>

                <form id="calcForm" autocomplete="off">
                    <!-- Date Input -->
                    <div class="form-group" id="dateGroup">
                        <label for="dateInput" class="form-label" id="dateLabel">
                            <span class="label-icon">📆</span>
                            วันผลิต (Manufacturing Date)
                        </label>
                        <div class="input-wrapper">
                            <input type="date" id="dateInput" class="form-input" required>
                            <button type="button" class="today-btn" id="todayBtn" title="ใช้วันนี้">วันนี้</button>
                        </div>
                    </div>

                    <!-- Shelf Life Input -->
                    <div class="form-group">
                        <label for="shelfLifeInput" class="form-label">
                            <span class="label-icon">⏳</span>
                            อายุการจัดเก็บ (Shelf Life)
                        </label>
                        <div class="shelf-life-row">
                            <div class="input-wrapper shelf-life-input-wrapper">
                                <input type="number" id="shelfLifeInput" class="form-input" min="1" max="9999" placeholder="เช่น 365" required>
                            </div>
                            <div class="unit-selector" id="unitSelector">
                                <button type="button" class="unit-btn active" data-unit="days" id="unitDays">วัน</button>
                                <button type="button" class="unit-btn" data-unit="months" id="unitMonths">เดือน</button>
                                <button type="button" class="unit-btn" data-unit="years" id="unitYears">ปี</button>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Shelf Life Presets -->
                    <div class="form-group">
                        <label class="form-label">
                            <span class="label-icon">⚡</span>
                            Shelf Life มาตรฐาน
                        </label>
                        <div class="preset-grid" id="presetGrid">
                            <button type="button" class="preset-btn" data-days="30" id="preset30">30 วัน</button>
                            <button type="button" class="preset-btn" data-days="60" id="preset60">60 วัน</button>
                            <button type="button" class="preset-btn" data-days="90" id="preset90">90 วัน</button>
                            <button type="button" class="preset-btn" data-days="180" id="preset180">6 เดือน</button>
                            <button type="button" class="preset-btn" data-days="270" id="preset270">9 เดือน</button>
                            <button type="button" class="preset-btn" data-days="365" id="preset365">1 ปี</button>
                            <button type="button" class="preset-btn" data-days="540" id="preset540">18 เดือน</button>
                            <button type="button" class="preset-btn" data-days="730" id="preset730">2 ปี</button>
                            <button type="button" class="preset-btn" data-days="1095" id="preset1095">3 ปี</button>
                        </div>
                    </div>

                    <!-- Calculate Button -->
                    <button type="submit" class="calculate-btn" id="calculateBtn">
                        <span class="btn-text">คำนวณ</span>
                        <span class="btn-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 12h14"/>
                                <path d="m12 5 7 7-7 7"/>
                            </svg>
                        </span>
                    </button>
                </form>
            </div>

            <!-- Result Card -->
            <div class="card result-card hidden" id="resultCard">
                <div class="card-header">
                    <div class="card-icon result-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                    </div>
                    <h2>ผลลัพธ์การคำนวณ</h2>
                </div>

                <div class="result-content">
                    <!-- Timeline Visualization -->
                    <div class="timeline-container">
                        <div class="timeline-point timeline-start">
                            <div class="timeline-dot"></div>
                            <div class="timeline-info">
                                <span class="timeline-label" id="resultMfgLabel">วันผลิต</span>
                                <span class="timeline-date" id="resultMfgDate">-</span>
                            </div>
                        </div>
                        <div class="timeline-bar">
                            <div class="timeline-fill" id="timelineFill"></div>
                            <div class="timeline-shelf-label" id="timelineShelfLabel">-</div>
                        </div>
                        <div class="timeline-point timeline-end">
                            <div class="timeline-dot"></div>
                            <div class="timeline-info">
                                <span class="timeline-label" id="resultExpLabel">วันหมดอายุ</span>
                                <span class="timeline-date" id="resultExpDate">-</span>
                            </div>
                        </div>
                    </div>

                    <!-- Detail Cards -->
                    <div class="result-details">
                        <div class="detail-item" id="detailMfg">
                            <div class="detail-icon">🏭</div>
                            <div class="detail-info">
                                <span class="detail-label">วันผลิต</span>
                                <span class="detail-value" id="detailMfgDate">-</span>
                            </div>
                        </div>
                        <div class="detail-item" id="detailExp">
                            <div class="detail-icon">📅</div>
                            <div class="detail-info">
                                <span class="detail-label">วันหมดอายุ</span>
                                <span class="detail-value" id="detailExpDate">-</span>
                            </div>
                        </div>
                        <div class="detail-item" id="detailShelf">
                            <div class="detail-icon">⏳</div>
                            <div class="detail-info">
                                <span class="detail-label">อายุการจัดเก็บ</span>
                                <span class="detail-value" id="detailShelfLife">-</span>
                            </div>
                        </div>
                        <div class="detail-item" id="detailRemaining">
                            <div class="detail-icon remaining-icon" id="remainingIcon">✅</div>
                            <div class="detail-info">
                                <span class="detail-label">สถานะ ณ วันนี้</span>
                                <span class="detail-value" id="detailRemainingDays">-</span>
                            </div>
                        </div>
                    </div>

                    <!-- Remaining Progress Bar -->
                    <div class="remaining-progress" id="remainingProgress">
                        <div class="progress-header">
                            <span class="progress-label">อายุคงเหลือ</span>
                            <span class="progress-percent" id="progressPercent">-</span>
                        </div>
                        <div class="progress-bar-track">
                            <div class="progress-bar-fill" id="progressBarFill"></div>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="result-actions">
                    <button class="action-btn reset-btn" id="resetBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"/>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                        </svg>
                        คำนวณใหม่
                    </button>
                    <button class="action-btn copy-btn" id="copyBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        คัดลอกผลลัพธ์
                    </button>
                </div>
            </div>

            <!-- History Card -->
            <div class="card history-card" id="historyCard">
                <div class="card-header">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                    </div>
                    <h2>ประวัติการคำนวณ</h2>
                    <button class="clear-history-btn" id="clearHistoryBtn" title="ลบประวัติทั้งหมด">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                    </button>
                </div>
                <div class="history-list" id="historyList">
                    <div class="history-empty" id="historyEmpty">
                        <span>ยังไม่มีประวัติการคำนวณ</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>Shelf Life Calculator v1.0 &copy; 2026</p>
        </footer>

        <!-- Toast Notification -->
        <div class="toast" id="toast">
            <span class="toast-icon">✅</span>
            <span class="toast-text" id="toastText">คัดลอกแล้ว!</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
